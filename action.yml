name: 'Required Approval'

description: 'Verifies that this pull request has been approved by of required individuals'

branding:
  icon: 
  color: green

inputs:
  token:
    description: "GitHub token used for authentication"
    required: true
  approvers:
    description: 'The list of specific users that can approve the request, newline separated. '
    required: true
  min-required:
    description: 'The minimum number of approvals, e.g. 2'
    required: true

runs: 
  using: "composite"
  steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2   
    - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: 16

    - name: Install Node.js dependencies
      shell: bash
      run: npm install

    - name: Check for approvals
      shell: bash
      run: node checkApprovals.js